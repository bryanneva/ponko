# ponko.yaml — Ponko configuration
# Copy this file: cp ponko.example.yaml ponko.yaml
# Then fill in your values, or run: ./scripts/setup.sh

# ── Bot ───────────────────────────────────────────────
bot_name: "Ponko"                      # Display name in prompts and Slack messages
bot_timezone: "America/Los_Angeles"    # IANA timezone for scheduled messages
bot_system_prompt: ""                  # Optional: override default personality

# ── Slack (required) ──────────────────────────────────
slack_bot_token: ""                    # Bot User OAuth Token (xoxb-...)
slack_signing_secret: ""               # App Signing Secret
slack_bot_user_id: ""                  # Bot's member ID (U...)

# ── AI (required) ────────────────────────────────────
anthropic_api_key: ""                  # From console.anthropic.com

# ── Deployment ────────────────────────────────────────
deploy_platform: "fly"                 # "fly" or "docker"
deploy_app_name: ""                    # Fly.io app name (generated if blank)
deploy_region: "iad"                   # Fly.io region
deploy_url: ""                         # Public URL (e.g., https://your-app.fly.dev)
deploy_api_key: ""                     # Bearer token for API auth (generated if blank)
deploy_cookie_signing_key: ""          # Session signing (generated if blank)
deploy_worker_concurrency: 10

# ── Dashboard OAuth (optional) ────────────────────────
dashboard_slack_client_id: ""
dashboard_slack_client_secret: ""
dashboard_slack_team_id: ""

# ── MCP Tools (optional) ─────────────────────────────
mcp_server_urls: []                    # Comma-separated MCP server URLs
mcp_access_key: ""                     # Shared access key for MCP servers

# ── GitHub MCP (optional) ────────────────────────────
github_mcp_url: ""                     # GitHub MCP server URL
github_pat: ""                         # GitHub personal access token

# ── Linear MCP (optional) ────────────────────────────
linear_mcp_url: ""                     # Linear MCP server URL
linear_access_token: ""                # Linear MCP access token
linear_token_url: ""                   # OAuth token refresh URL
linear_client_id: ""                   # OAuth client ID
linear_client_secret: ""               # OAuth client secret
linear_refresh_token: ""               # OAuth refresh token

# ── Observability (optional) ─────────────────────────
otel_endpoint: ""                      # OpenTelemetry collector endpoint
otel_exporter: ""                      # "otlp" or "stdout"
