name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: agent_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: npm --prefix web install && npm --prefix web run build

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

      - name: Build
        run: make build

      - name: Unit tests
        run: make test-coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
            echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total**: ${COVERAGE}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: E2E tests
        if: env.ANTHROPIC_API_KEY != ''
        env:
          DATABASE_URL: postgres://agent:agent@localhost:5432/agent_dev?sslmode=disable
        run: make test-e2e
