name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: v0.20.5
          verb: call
          args: lint --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: v0.20.5
          verb: call
          args: build --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Unit tests
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: v0.20.5
          verb: call
          args: test --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: E2E tests
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: v0.20.5
          verb: call
          args: e-2-e --source=. --anthropic-api-key env:ANTHROPIC_API_KEY
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
